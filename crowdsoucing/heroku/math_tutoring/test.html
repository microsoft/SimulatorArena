<!DOCTYPE html>
<html>
<head>
    <title>Simple Iframe Example</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="http://127.0.0.1:7860/">
        Your browser does not support iframes.
    </iframe>
</body>
</html>
